name: Sync Predicts Data

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from Slack and write data.json
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.parse, json, os

          token   = os.environ['SLACK_TOKEN']
          channel = 'C0B19MPAG9M'
          marker  = '◆PREDICTS_DATA◆'

          body = urllib.parse.urlencode({
              'token': token, 'channel': channel, 'limit': '10'
          }).encode()

          req = urllib.request.Request(
              'https://slack.com/api/conversations.history',
              data=body,
              headers={'Content-Type': 'application/x-www-form-urlencoded'}
          )

          with urllib.request.urlopen(req) as r:
              resp = json.loads(r.read())

          if not resp.get('ok'):
              print(f"Slack error: {resp.get('error')}")
              exit(1)

          data_msg = next(
              (m for m in resp.get('messages', []) if marker in m.get('text', '')),
              None
          )

          if not data_msg:
              print('No data message found in channel yet')
              exit(0)

          text = data_msg['text']
          text = text.replace('&amp;', '&').replace('&lt;', '<').replace('&gt;', '>')
          idx  = text.index(marker) + len(marker)
          json_str = text[idx:].strip()

          depth, end = 0, 0
          for i, ch in enumerate(json_str):
              if ch == '{': depth += 1
              elif ch == '}':
                  depth -= 1
                  if depth == 0:
                      end = i + 1
                      break

          data = json.loads(json_str[:end])

          with open('data.json', 'w') as f:
              json.dump(data, f, separators=(',', ':'))

          print('data.json written successfully')
          EOF

      - name: Commit and push data.json
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update predicts data [skip ci]"
          git push
