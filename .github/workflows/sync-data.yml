name: Sync Predicts Data

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from Slack and write data.json
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.parse, json, os, sys
          from datetime import datetime, timezone

          token   = os.environ['SLACK_TOKEN']
          channel = 'C0B19MPAG9M'
          marker  = '◆PREDICTS_DATA◆'
          MAX_AGE_MINUTES = 35  # reject messages older than this

          # ── Fetch recent messages ────────────────────────────────────────
          body = urllib.parse.urlencode({
              'token': token, 'channel': channel, 'limit': '10'
          }).encode()

          req = urllib.request.Request(
              'https://slack.com/api/conversations.history',
              data=body,
              headers={'Content-Type': 'application/x-www-form-urlencoded'}
          )

          with urllib.request.urlopen(req) as r:
              resp = json.loads(r.read())

          if not resp.get('ok'):
              print(f"Slack API error: {resp.get('error')}")
              sys.exit(1)

          # ── Find the most recent data message ───────────────────────────
          data_msg = next(
              (m for m in resp.get('messages', []) if marker in m.get('text', '')),
              None
          )

          if not data_msg:
              print('No data message found in Slack channel — task may not have run yet')
              sys.exit(0)

          # ── Freshness check ─────────────────────────────────────────────
          msg_ts   = float(data_msg['ts'])
          msg_time = datetime.fromtimestamp(msg_ts, tz=timezone.utc)
          now      = datetime.now(tz=timezone.utc)
          age_min  = (now - msg_time).total_seconds() / 60

          if age_min > MAX_AGE_MINUTES:
              print(f'Slack message is {age_min:.0f} min old (limit: {MAX_AGE_MINUTES} min) — skipping update to avoid serving stale data')
              sys.exit(0)

          print(f'Found data message, age: {age_min:.1f} min')

          # ── Extract JSON ─────────────────────────────────────────────────
          text = data_msg['text']
          text = text.replace('&amp;', '&').replace('&lt;', '<').replace('&gt;', '>')
          idx  = text.index(marker) + len(marker)
          json_str = text[idx:].strip()

          # Find the complete JSON object
          depth, end = 0, 0
          for i, ch in enumerate(json_str):
              if ch == '{': depth += 1
              elif ch == '}':
                  depth -= 1
                  if depth == 0:
                      end = i + 1
                      break

          if end == 0:
              print('Could not find complete JSON object in message — may be truncated')
              sys.exit(1)

          raw_json = json_str[:end]

          # ── Validate the payload ─────────────────────────────────────────
          try:
              data = json.loads(raw_json)
          except json.JSONDecodeError as e:
              print(f'JSON parse error: {e}')
              sys.exit(1)

          if not data.get('v') or not data.get('ts'):
              print('Payload missing required fields — skipping')
              sys.exit(1)

          # ── Write to file ────────────────────────────────────────────────
          with open('data.json', 'w') as f:
              json.dump(data, f, separators=(',', ':'))

          orders = data.get('stats', {}).get('orders', '?')
          events = data.get('stats', {}).get('events', '?')
          print(f'data.json written — {orders} orders, {events} events, source: {data.get("plan_source","?")}')
          EOF

      - name: Commit and push data.json
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "chore: update predicts data [skip ci]" && git push)
